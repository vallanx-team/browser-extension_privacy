<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Seite blockiert — Vallanx Privacy Shield</title>
  <link rel="stylesheet" href="../resources/css/styles.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
    .blocked-card { max-width:480px; padding:40px; }
    .shield-icon { font-size:64px; margin-bottom:16px; }
    h1 { color:var(--danger); font-size:24px; margin-bottom:12px; }
    .blocked-url { font-size:13px; color:var(--text-muted); word-break:break-all;
      background:var(--surface); padding:8px 12px; border-radius:6px; margin:16px 0; }
    .btn-continue { margin-top:16px; }
  </style>
</head>
<body>
  <div class="blocked-card card">
    <div class="shield-icon">🛡</div>
    <h1 id="blocked-title">Seite blockiert</h1>
    <p id="blocked-msg">Diese Seite wurde durch Vallanx Privacy Shield blockiert.</p>
    <!-- Kein URL-Parameter: declarativeNetRequest-Redirects sind statisch,
         die blockierte URL kann nicht als Query-Parameter übergeben werden. -->
    <button class="btn btn-ghost" id="btn-back" style="margin-top:12px">← Zurück</button>
    <button class="btn btn-danger btn-continue" style="margin-top:12px" id="btn-continue">Trotzdem fortfahren</button>
  </div>
  <script>
    document.getElementById('btn-back').addEventListener('click', () => history.back());
    // "Trotzdem fortfahren": Ohne blockierte URL nicht möglich via declarativeNetRequest-Redirect.
    // Der Nutzer kann die Seite manuell in der Adressleiste eingeben oder auf Zurück klicken.
    document.getElementById('btn-continue').addEventListener('click', () => {
      document.getElementById('btn-continue').textContent = 'Bitte URL manuell eingeben';
    });
  </script>
</body>
</html>
