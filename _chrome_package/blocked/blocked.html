<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Seite blockiert — Vallanx Privacy Shield</title>
  <link rel="stylesheet" href="../resources/css/styles.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
    .blocked-card { max-width:480px; padding:40px; }
    .shield-icon { font-size:64px; margin-bottom:16px; }
    h1 { color:var(--danger); font-size:24px; margin-bottom:12px; }
    .blocked-url { font-size:13px; color:var(--text-muted); word-break:break-all;
      background:var(--surface); padding:8px 12px; border-radius:6px; margin:16px 0; }
    .btn-continue { margin-top:16px; }
  </style>
</head>
<body>
  <div class="blocked-card card">
    <div class="shield-icon">🛡</div>
    <h1 id="blocked-title" data-i18n="blockedTitle">Seite blockiert</h1>
    <p id="blocked-msg" data-i18n="blockedMsg">Diese Seite wurde durch Vallanx Privacy Shield blockiert.</p>
    <p id="blocked-list-info" style="display:none;font-size:12px;color:var(--text-muted);margin-top:8px"></p>
    <button class="btn btn-ghost" id="btn-back" data-i18n="blockedBack" style="margin-top:12px">← Zurück</button>
    <button class="btn btn-danger btn-continue" id="btn-continue" data-i18n="blockedContinue">Trotzdem fortfahren</button>
  </div>
  <script type="module">
    import { loadI18n, t, applyI18n } from '../resources/js/i18n.js';
    (async () => {
      const { language = 'de', simpleLang = false } = await chrome.storage.sync.get({ language: 'de', simpleLang: false });
      await loadI18n(language, simpleLang);
      applyI18n();
      const listName = new URLSearchParams(location.search).get('list');
      if (listName) {
        const el = document.getElementById('blocked-list-info');
        el.textContent = t('blockedByList', { list: listName });
        el.style.display = 'block';
      }
    })();
    document.getElementById('btn-back').addEventListener('click', () => history.back());
    document.getElementById('btn-continue').addEventListener('click', () => {
      document.getElementById('btn-continue').textContent = '← URL manuell eingeben';
    });
  </script>
</body>
</html>
