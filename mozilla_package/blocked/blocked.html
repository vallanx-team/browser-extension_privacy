<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BLOCKED — Vallanx Privacy Shield</title>
  <link rel="stylesheet" href="../resources/css/styles.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
    .blocked-card { max-width:480px; padding:40px; }
    .shield-icon { font-size:64px; margin-bottom:16px; }
    h1 { color:var(--danger); font-size:24px; margin-bottom:12px; }
    .blocked-url { font-size:13px; color:var(--text-muted); word-break:break-all;
      background:var(--surface); padding:8px 12px; border-radius:6px; margin:16px 0; }
    .btn-continue { margin-top:16px; }
  </style>
</head>
<body>
  <div class="blocked-card card">
    <!-- <div class="shield-icon">🛡</div> -->
    <img src="security.gif" style="width: 220px; display: block; margin: auto;" alt="Technology illustrations by Storyset">
    <h1 id="blocked-title" data-i18n="blockedTitle">Page blocked</h1>
    <p id="blocked-msg" data-i18n="blockedMsg">This page has been blocked by Vallanx Privacy Shield.</p>
    <p id="blocked-list-info" style="display:none;font-size:12px;color:var(--text-muted);margin-top:8px"></p>
    <button class="btn btn-ghost" id="btn-back" data-i18n="blockedBack" style="margin-top:12px">← Back</button>
    <button class="btn btn-danger btn-continue" id="btn-continue" data-i18n="blockedContinue">Continue anyway</button>
  </div>
  <script type="module" src="blocked.js"></script>
</body>
</html>
